---
bootstrap_user: "{{ lookup('env', 'BOOTSTRAP_USER') | default(lookup('env', 'USER'), true) }}"
bootstrap_home: "{{ lookup('env', 'BOOTSTRAP_HOME') | default(lookup('env', 'HOME'), true) }}"
xdg_config_home: "{{ bootstrap_home }}/.config"
xdg_cache_home: "{{ bootstrap_home }}/.cache"
xdg_data_home: "{{ bootstrap_home }}/.local/share"
xdg_state_home: "{{ bootstrap_home }}/.local/state"
git_config_dir: "{{ xdg_config_home }}/git"
git_config_global_path: "{{ git_config_dir }}/config"
doppler_config_dir: "{{ xdg_config_home }}/doppler"

base_packages:
  - curl
  - git
  - openssh
  - sudo
  - unzip
  - wget

doppler_install: false
doppler_packages:
  - gnupg
doppler_project: base
doppler_config: dev_personal
doppler_git_user_name_secret: GIT_USER_NAME
doppler_git_user_email_secret: GIT_USER_EMAIL
doppler_ssh_private_key_secret: SSH_PRIVATE_KEY
doppler_ssh_public_key_secret: SSH_PUBLIC_KEY
doppler_ssh_key_path: "{{ bootstrap_home }}/.ssh/id_ed25519"

git_user_name: Pablo
git_user_email: pablo@renderbros.com
git_core_editor: nvim

github_cli_packages:
  - github-cli

neovim_packages:
  - neovim
  - git
  - curl
  - gcc
  - make
  - fd
  - ripgrep
  - tree-sitter-cli
  - unzip
  - xclip
  - wl-clipboard

neovim_config_dir: "{{ xdg_config_home }}/nvim"
neovim_data_dir: "{{ xdg_data_home }}/nvim"
neovim_state_dir: "{{ xdg_state_home }}/nvim"
neovim_cache_dir: "{{ xdg_cache_home }}/nvim"
neovim_lazyvim_repo: https://github.com/LazyVim/starter

zsh_packages:
  - zsh
zsh_font_packages:
  - ttf-jetbrains-mono-nerd
zsh_shell_path: /usr/bin/zsh
zsh_config_dir: "{{ xdg_config_home }}/zsh"
zsh_rc_path: "{{ zsh_config_dir }}/.zshrc"
zsh_env_path: "{{ bootstrap_home }}/.zshenv"
oh_my_posh_bin_dir: "{{ bootstrap_home }}/.local/bin"
